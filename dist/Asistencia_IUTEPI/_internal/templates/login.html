<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login | S.G.A.</title>
    <link rel="icon" href="{{ url_for('static', filename='img/favicon.png') }}" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="auth-bg">
    <div class="box">
        <img src="{{ url_for('static', filename='img/IUTEPI Logo.png') }}" alt="IUTEPI" class="logo-img">
        <h2>🔐 Acceso Admin</h2>
        
        {% if msg %}
            <div class="alert error">{{ msg }}</div>
        {% endif %}
        
        <form method="POST">
            <input type="text" name="usuario" placeholder="Usuario" required autocomplete="off">
            
            <div class="password-container">
                <input type="password" name="password" id="loginPass" placeholder="Contraseña" required>
                <i class="fas fa-eye toggle-password" id="toggleLoginPass"></i>
            </div>

            <button type="submit" class="btn-dark">INICIAR SESIÓN</button>
        </form>
        <div class="links"><a href="/">← Volver al Terminal de Asistencia</a></div>
    </div>

    <script>
        // SCRIPT DEL OJITO
        const toggleIcon = document.getElementById('toggleLoginPass');
        const passInput = document.getElementById('loginPass');
        
        toggleIcon.addEventListener('click', function() {
            const type = passInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passInput.setAttribute('type', type);
            this.classList.toggle('fa-eye');
            this.classList.toggle('fa-eye-slash');
        });
    </script>
</body>
</html>
